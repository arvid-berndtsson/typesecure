name: Publish to npm and JSR

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC trusted publishing
      attestations: write # Ensure provenance/attestation metadata can be emitted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          # registry-url not needed with trusted publishing (OIDC)
          # npm will auto-detect the OIDC environment and registry

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.3

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build package
        run: pnpm run build

      - name: Validate version metadata
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          JSR_VERSION=$(node -p "require('./jsr.json').version")

          if [ "$PKG_VERSION" != "$JSR_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION jsr.json=$JSR_VERSION"
            exit 1
          fi

          if [ "${{ github.event_name }}" == "release" ]; then
            TAG_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "Release tag version ($TAG_VERSION) does not match package/jsr version ($PKG_VERSION)."
              exit 1
            fi
            echo "Validated release tag and package versions: $PKG_VERSION"
          else
            echo "Manual publish for pre-versioned source at version: $PKG_VERSION"
          fi

      - name: Publish to npm
        run: |
          # Use npm publish for trusted publishing (OIDC) support
          # pnpm publish doesn't fully support OIDC yet
          # No NODE_AUTH_TOKEN needed - OIDC handles authentication automatically
          npm publish --access public --registry https://registry.npmjs.org

      - name: Publish to JSR
        # JSR uses GitHub OIDC in Actions; no token secret is required.
        run: npx jsr publish
